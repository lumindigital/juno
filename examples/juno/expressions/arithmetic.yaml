apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  annotations:
    workflows.argoproj.io/description: |
      This is an example of the ways arithmetic expressions can be used.
  generateName: arithmetic-
  labels:
    workflows.argoproj.io/archive-strategy: 'false'
spec:
  arguments:
    parameters:
      - name: workflow-int-param
        value: "2"
  entrypoint: entrypoint
  templates:
    - dag:
        tasks:
          - arguments:
              parameters:
                - name: add-param
                  value: "{{=asInt(workflow.parameters['workflow-int-param']) + 1}}"
                - name: subtract-param
                  value: "{{=asInt(workflow.parameters['workflow-int-param']) - 3}}"
                - name: divide-param
                  value: "{{=asInt(workflow.parameters['workflow-int-param']) / 2}}"
                - name: multiply-param
                  value: "{{=asInt(workflow.parameters['workflow-int-param']) * 2}}"
                - name: modulus-param
                  value: "{{=asInt(workflow.parameters['workflow-int-param']) % 2}}"
                - name: exponent-param
                  value: "{{=asInt(workflow.parameters['workflow-int-param']) ** 3}}"
            name: arithmetic-task
            template: arithmetic
      name: entrypoint
    - inputs:
        parameters:
          - name: add-param
          - name: subtract-param
          - name: divide-param
          - name: multiply-param
          - name: modulus-param
          - name: exponent-param
      name: arithmetic
      script:
        command:
          - '/bin/sh'
          - '-e'
        image: busybox
        source: |
          if [ "{{inputs.parameters.add-param}}" != "3" ]; then echo "add failed: got '{{inputs.parameters.add-param}}'"; exit 12; fi
          if [ "{{inputs.parameters.subtract-param}}" != "-1" ]; then echo "subtract failed: got '{{inputs.parameters.subtract-param}}'"; exit 13; fi
          if [ "{{inputs.parameters.divide-param}}" != "1" ]; then echo "divide failed: got '{{inputs.parameters.divide-param}}'"; exit 14; fi
          if [ "{{inputs.parameters.multiply-param}}" != "4" ]; then echo "multiply failed: got '{{inputs.parameters.multiply-param}}'"; exit 15; fi
          if [ "{{inputs.parameters.modulus-param}}" != "0" ]; then echo "modulus failed: got '{{inputs.parameters.modulus-param}}'"; exit 16; fi
          if [ "{{inputs.parameters.exponent-param}}" != "8" ]; then echo "exponent failed: got '{{inputs.parameters.exponent-param}}'"; exit 17; fi
          echo "All arithmetic tests passed"