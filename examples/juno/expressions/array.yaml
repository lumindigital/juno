apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  annotations:
    workflows.argoproj.io/description: |
      This is an example of the ways array expressions can be used.
  generateName: array-
  labels:
    workflows.argoproj.io/archive-strategy: "false"
spec:
  arguments:
    parameters:
      - name: workflow-array-param
        value: "[3,1,2,1]"
      - name: workflow-nested-param
        value: "[[1,2],[3,4]]"
      - name: workflow-array2-param
        value: "[5,6]"
      - name: workflow-array-string-param
        value: '["3","1","2","1"]'
  entrypoint: entrypoint
  templates:
    - inputs:
        parameters:
          - name: first-param
          - name: last-param
          - name: flatten-param
          - name: reverse-param
          - name: sort-param
          - name: uniq-param
          - name: join-param
          - name: concat-param
          - name: mean-param
          - name: median-param
          - name: take-param
          - name: all-param
          - name: any-param
          - name: one-param
          - name: none-param
          - name: map-param
          - name: filter-param
          - name: find-param
          - name: find-index-param
          - name: find-last-param
          - name: find-last-index-param
          - name: group-by-param
          - name: count-param
          - name: reduce-param
          - name: sum-param
          - name: sort-by-param
      name: array
      script:
        command:
          - /bin/sh
          - -e
        image: busybox
        source: |
          if [ "{{inputs.parameters.first-param}}" != "3" ]; then echo "first failed: got '{{inputs.parameters.first-param}}'"; exit 11; fi
          if [ "{{inputs.parameters.last-param}}" != "1" ]; then echo "last failed: got '{{inputs.parameters.last-param}}'"; exit 12; fi
          if [ "{{inputs.parameters.flatten-param}}" != "[1,2,3,4]" ]; then echo "flatten failed: got '{{inputs.parameters.flatten-param}}'"; exit 13; fi
          if [ "{{inputs.parameters.reverse-param}}" != "[1,2,1,3]" ]; then echo "reverse failed: got '{{inputs.parameters.reverse-param}}'"; exit 14; fi
          if [ "{{inputs.parameters.sort-param}}" != "[1,1,2,3]" ]; then echo "sort failed: got '{{inputs.parameters.sort-param}}'"; exit 15; fi
          if [ "{{inputs.parameters.uniq-param}}" != "[3,1,2]" ]; then echo "uniq failed: got '{{inputs.parameters.uniq-param}}'"; exit 16; fi
          if [ "{{inputs.parameters.join-param}}" != "3, 1, 2, 1" ]; then echo "join failed: got '{{inputs.parameters.join-param}}'"; exit 17; fi
          if [ "{{inputs.parameters.concat-param}}" != "[3,1,2,1,5,6]" ]; then echo "concat failed: got '{{inputs.parameters.concat-param}}'"; exit 18; fi
          if [ "{{inputs.parameters.mean-param}}" != "1.75" ]; then echo "mean failed: got '{{inputs.parameters.mean-param}}'"; exit 19; fi
          if [ "{{inputs.parameters.median-param}}" != "1.5" ]; then echo "median failed: got '{{inputs.parameters.median-param}}'"; exit 20; fi
          if [ "{{inputs.parameters.take-param}}" != "[3,1]" ]; then echo "take failed: got '{{inputs.parameters.take-param}}'"; exit 21; fi
          if [ "{{inputs.parameters.all-param}}" != "true" ]; then echo "all failed: got '{{inputs.parameters.all-param}}'"; exit 22; fi
          if [ "{{inputs.parameters.any-param}}" != "true" ]; then echo "any failed: got '{{inputs.parameters.any-param}}'"; exit 23; fi
          if [ "{{inputs.parameters.one-param}}" != "true" ]; then echo "one failed: got '{{inputs.parameters.one-param}}'"; exit 24; fi
          if [ "{{inputs.parameters.none-param}}" != "true" ]; then echo "none failed: got '{{inputs.parameters.none-param}}'"; exit 25; fi
          if [ "{{inputs.parameters.map-param}}" != "[6,2,4,2]" ]; then echo "map failed: got '{{inputs.parameters.map-param}}'"; exit 26; fi
          if [ "{{inputs.parameters.filter-param}}" != "[3,2]" ]; then echo "filter failed: got '{{inputs.parameters.filter-param}}'"; exit 27; fi
          if [ "{{inputs.parameters.find-param}}" != "3" ]; then echo "find failed: got '{{inputs.parameters.find-param}}'"; exit 28; fi
          if [ "{{inputs.parameters.find-index-param}}" != "0" ]; then echo "findIndex failed: got '{{inputs.parameters.find-index-param}}'"; exit 29; fi
          if [ "{{inputs.parameters.find-last-param}}" != "2" ]; then echo "findLast failed: got '{{inputs.parameters.find-last-param}}'"; exit 30; fi
          if [ "{{inputs.parameters.find-last-index-param}}" != "2" ]; then echo "findLastIndex failed: got '{{inputs.parameters.find-last-index-param}}'"; exit 31; fi
          if [ "{{inputs.parameters.group-by-param}}" != "[["3",["3"]],["1",["1","1"]],["2",["2"]]]" ]; then echo "groupBy failed: got '{{inputs.parameters.group-by-param}}'"; exit 32; fi
          if [ "{{inputs.parameters.count-param}}" != "2" ]; then echo "count failed: got '{{inputs.parameters.count-param}}'"; exit 33; fi
          if [ "{{inputs.parameters.reduce-param}}" != "7" ]; then echo "reduce failed: got '{{inputs.parameters.reduce-param}}'"; exit 34; fi
          if [ "{{inputs.parameters.sum-param}}" != "7" ]; then echo "sum failed: got '{{inputs.parameters.sum-param}}'"; exit 35; fi
          if [ "{{inputs.parameters.sort-by-param}}" != [1,1,2,3] ]; then echo "sortBy failed: got '{{inputs.parameters.sort-by-param}}'"; exit 36; fi
          echo "All array function tests passed"
    - dag:
        tasks:
          - arguments:
              parameters:
                - name: first-param
                  value: "{{=first(fromJSON(workflow.parameters['workflow-array-param']))}}"
                - name: last-param
                  value: "{{=last(fromJSON(workflow.parameters['workflow-array-param']))}}"
                - name: flatten-param
                  value: "{{=flatten(fromJSON(workflow.parameters['workflow-nested-param']))}}"
                - name: reverse-param
                  value: "{{=reverse(fromJSON(workflow.parameters['workflow-array-param']))}}"
                - name: sort-param
                  value: "{{=sort(fromJSON(workflow.parameters['workflow-array-param']))}}"
                - name: uniq-param
                  value: "{{=uniq(fromJSON(workflow.parameters['workflow-array-param']))}}"
                - name: join-param
                  value: "{{=join(fromJSON(workflow.parameters['workflow-array-string-param']), ', ')}}"
                - name: concat-param
                  value: "{{=concat(fromJSON(workflow.parameters['workflow-array-param']), fromJSON(workflow.parameters['workflow-array2-param']))}}"
                - name: mean-param
                  value: "{{=mean(fromJSON(workflow.parameters['workflow-array-param']))}}"
                - name: median-param
                  value: "{{=median(fromJSON(workflow.parameters['workflow-array-param']))}}"
                - name: take-param
                  value: "{{=take(fromJSON(workflow.parameters['workflow-array-param']), 2)}}"
                - name: all-param
                  value: "{{=all(fromJSON(workflow.parameters['workflow-array-param']), {# > 0})}}"
                - name: any-param
                  value: "{{=any(fromJSON(workflow.parameters['workflow-array-param']), {# > 2})}}"
                - name: one-param
                  value: "{{=one(fromJSON(workflow.parameters['workflow-array-param']), {# == 3})}}"
                - name: none-param
                  value: "{{=none(fromJSON(workflow.parameters['workflow-array-param']), {# < 0})}}"
                - name: map-param
                  value: "{{=map(fromJSON(workflow.parameters['workflow-array-param']), {# * 2})}}"
                - name: filter-param
                  value: "{{=filter(fromJSON(workflow.parameters['workflow-array-param']), {# > 1})}}"
                - name: find-param
                  value: "{{=find(fromJSON(workflow.parameters['workflow-array-param']), {# > 1})}}"
                - name: find-index-param
                  value: "{{=findIndex(fromJSON(workflow.parameters['workflow-array-param']), {# > 1})}}"
                - name: find-last-param
                  value: "{{=findLast(fromJSON(workflow.parameters['workflow-array-param']), {# > 1})}}"
                - name: find-last-index-param
                  value: "{{=findLastIndex(fromJSON(workflow.parameters['workflow-array-param']), {# > 1})}}"
                - name: group-by-param
                  value: "{{=toPairs(groupBy(fromJSON(workflow.parameters['workflow-array-string-param']), {#}))}}"
                - name: count-param
                  value: "{{=count(fromJSON(workflow.parameters['workflow-array-param']), {# > 1})}}"
                - name: reduce-param
                  value: "{{=reduce(fromJSON(workflow.parameters['workflow-array-param']), {#acc + #}, 0)}}"
                - name: sum-param
                  value: "{{=sum(fromJSON(workflow.parameters['workflow-array-param']))}}"
                - name: sort-by-param
                  value: "{{=sortBy(fromJSON(workflow.parameters['workflow-array-param']), { # })}}"
            name: array-task
            template: array
      name: entrypoint
