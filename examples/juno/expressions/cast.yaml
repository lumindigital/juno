apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  annotations:
    workflows.argoproj.io/description: |
      This is an example of the ways cast expressions can be used.
  generateName: cast-
  labels:
    workflows.argoproj.io/archive-strategy: 'false'
spec:
  arguments:
    parameters:
      - name: workflow-int-param
        value: "1"
      - name: workflow-float-param
        value: "1.5"
      - name: workflow-json-param
        value: '{"isTrue":"true"}'
      - name: workflow-base64-param
        value: eyJpc1RydWUiOiJ0cnVlIn0=

  entrypoint: entrypoint
  templates:
    - dag:
        tasks:
          - arguments:
              parameters:
                - name: int-param
                  value: "{{=asInt(workflow.parameters['workflow-int-param']) == 1}}"
                - name: float-param
                  value: "{{=asFloat(workflow.parameters['workflow-float-param']) == 1.5}}"
                - name: json-param
                  value: "{{=jsonpath(workflow.parameters['workflow-json-param'], '$.isTrue') == 'true'}}"
                - name: string-int-param
                  value: "{{=string(workflow.parameters['workflow-int-param'])}}"
                - name: to-json-param
                  value: "{{=toJSON(workflow.parameters['workflow-json-param'])}}"
                - name: from-json-param
                  value: "{{=fromJSON(workflow.parameters['workflow-json-param'])}}"
                - name: type-param
                  value: "{{=type(workflow.parameters['workflow-int-param'])}}"
                - name: to-base64-param
                  value: "{{=toBase64(workflow.parameters['workflow-json-param'])}}"
                - name: from-base64-param
                  value: "{{=fromBase64(workflow.parameters['workflow-base64-param'])}}"
                - name: to-pairs-param
                  value: "{{=toPairs(fromJSON(workflow.parameters['workflow-json-param']))}}"
                - name: cast-literal-string-param
                  value: "{{=string(1) == '1'}}"
            name: cast-task
            template: cast
      name: entrypoint
    - inputs:
        parameters:
          - name: int-param
          - name: float-param
          - name: json-param
          - name: string-int-param
          - name: to-json-param
          - name: from-json-param
          - name: type-param
          - name: to-base64-param
          - name: from-base64-param
          - name: to-pairs-param
          - name: cast-literal-string-param
      name: cast
      script:
        command:
          - '/bin/sh'
          - '-e'
        image: busybox
        source: |
          if [ "{{inputs.parameters.int-param}}" != "true" ]; then echo "asInt failed: got '{{inputs.parameters.int-param}}'"; exit 12; fi
          if [ "{{inputs.parameters.float-param}}" != "true" ]; then echo "asFloat failed: got '{{inputs.parameters.float-param}}'"; exit 13; fi
          if [ "{{inputs.parameters.json-param}}" != "true" ]; then echo "jsonPath failed: got '{{inputs.parameters.json-param}}'"; exit 14; fi
          if [ "{{inputs.parameters.cast-literal-string-param}}" != "true" ]; then echo "asString literal failed: got '{{inputs.parameters.cast-literal-string-param}}'"; exit 16; fi
          if [ "{{inputs.parameters.to-json-param}}" != "{\"isTrue\":\"true\"}" ]; then echo "toJson failed: got '{{inputs.parameters.to-json-param}}'"; exit 17; fi
          if [ "{{inputs.parameters.from-json-param}}" != "{"isTrue":"true"}" ]; then echo "fromJson failed: got '{{inputs.parameters.from-json-param}}'"; exit 18; fi
          if [ "{{inputs.parameters.type-param}}" != "string" ]; then echo "asType failed: got '{{inputs.parameters.type-param}}'"; exit 19; fi
          if [ "{{inputs.parameters.to-base64-param}}" != "eyJpc1RydWUiOiJ0cnVlIn0=" ]; then echo "toBase64 failed: got '{{inputs.parameters.to-base64-param}}'"; exit 20; fi
          if [ "{{inputs.parameters.from-base64-param}}" != "{"isTrue":"true"}" ]; then echo "fromBase64 failed: got '{{inputs.parameters.from-base64-param}}'"; exit 21; fi
          if [ "{{inputs.parameters.to-pairs-param}}" != "[["isTrue","true"]]" ]; then echo "toPairs failed: got '{{inputs.parameters.to-pairs-param}}'"; exit 22; fi
          echo "All cast tests passed"