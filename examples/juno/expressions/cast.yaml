apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  annotations:
    workflows.argoproj.io/description: |
      This is an example of the ways cast expressions can be used.
  generateName: cast-
  labels:
    workflows.argoproj.io/archive-strategy: 'false'
spec:
  arguments:
    parameters:
      - name: workflow-int-param
        value: "1"
      - name: workflow-float-param
        value: "1.5"
      - name: workflow-json-param
        value: '{"isTrue":"true"}'
      - name: workflow-base64-param
        value: eyJpc1RydWUiOiJ0cnVlIn0=

  entrypoint: entrypoint
  templates:
    - dag:
        tasks:
          - arguments:
              parameters:
                - name: int-param
                  value: "{{=asInt(workflow.parameters['workflow-int-param']) == 1}}"
                - name: float-param
                  value: "{{=asFloat(workflow.parameters['workflow-float-param']) == 1.5}}"
                - name: json-param
                  value: "{{=jsonpath(workflow.parameters['workflow-json-param'], '$.isTrue') == 'true'}}"
                - name: string-int-param
                  value: "{{=string(workflow.parameters['workflow-int-param'])}}"
                - name: to-json-param
                  value: "{{=toJSON(workflow.parameters['workflow-json-param'])}}"
                - name: from-json-param
                  value: "{{=fromJSON(workflow.parameters['workflow-json-param'])}}"
                - name: type-param
                  value: "{{=type(workflow.parameters['workflow-int-param'])}}"
                - name: to-base64-param
                  value: "{{=toBase64(workflow.parameters['workflow-json-param'])}}"
                - name: from-base64-param
                  value: "{{=fromBase64(workflow.parameters['workflow-base64-param'])}}"
                - name: to-pairs-param
                  value: "{{=toPairs(fromJSON(workflow.parameters['workflow-json-param']))}}"
            name: cast-task
            template: cast
      name: entrypoint
    - inputs:
        parameters:
          - name: int-param
          - name: float-param
          - name: json-param
          - name: string-int-param
          - name: to-json-param
          - name: from-json-param
          - name: type-param
          - name: to-base64-param
          - name: from-base64-param
          - name: to-pairs-param
      name: cast
      script:
        command:
          - '/bin/sh'
          - '-e'
        env:
          - name: CAST_INT_TO_STRING
            value: "{{=string(1) == '1'}}"
        image: busybox
        source:  >
          if [ "{{inputs.parameters.int-param}}" != true ]; then exit 12; fi
                               if [ "{{inputs.parameters.float-param}}" != true ]; then exit 13; fi
                               if [ "{{inputs.parameters.json-param}}" != true ]; then exit 14; fi
                               if [ "$CAST_INT_TO_STRING" != true ]; then exit 16; fi
                               if [ "{{inputs.parameters.to-json-param}}" != "{\"isTrue\":\"true\"}" ]; then exit 17; fi
                               if [ "{{inputs.parameters.from-json-param}}" != "{"isTrue":"true"}" ]; then exit 18; fi
                               if [ "{{inputs.parameters.type-param}}" != "string" ]; then exit 19; fi
                               if [ "{{inputs.parameters.to-base64-param}}" != "eyJpc1RydWUiOiJ0cnVlIn0=" ]; then exit 20; fi
                               if [ "{{inputs.parameters.from-base64-param}}" != "{"isTrue":"true"}" ]; then exit 21; fi
                               if [ "{{inputs.parameters.to-pairs-param}}" != "[["isTrue","true"]]" ]; then exit 22; fi