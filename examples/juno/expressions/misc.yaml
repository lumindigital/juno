apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  annotations:
    workflows.argoproj.io/description: |
      This is an example of the ways misc expressions can be used.
  generateName: misc-
  labels:
    workflows.argoproj.io/archive-strategy: 'false'
spec:
  arguments:
    parameters:
      - name: workflow-array-param
        value: '["one", "two", "three"]'
      - name: workflow-json-param
        value: '{"name":"juno","version":"1"}'
  entrypoint: entrypoint
  templates:
    - dag:
        tasks:
          - arguments:
              parameters:
                - name: len-param
                  value: "{{=len(fromJSON(workflow.parameters['workflow-array-param']))}}"
                - name: get-by-index-param
                  value: "{{=get(fromJSON(workflow.parameters['workflow-array-param']), 0)}}"
                - name: get-by-key-param
                  value: "{{=get(fromJSON(workflow.parameters['workflow-json-param']), 'name')}}"
            name: misc-task
            template: misc
      name: entrypoint
    - inputs:
        parameters:
          - name: len-param
          - name: get-by-index-param
          - name: get-by-key-param
      name: misc
      script:
        command:
          - '/bin/sh'
          - '-e'
        image: busybox
        source:  >
          if [ "{{inputs.parameters.len-param}}" != 3 ]; then exit 12; fi
                               if [ "{{inputs.parameters.get-by-index-param}}" != "one" ]; then exit 13; fi
                               if [ "{{inputs.parameters.get-by-key-param}}" != "juno" ]; then exit 14; fi
