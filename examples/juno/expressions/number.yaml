apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  annotations:
    workflows.argoproj.io/description: |
      This is an example of the ways number expressions can be used.
  generateName: number-
  labels:
    workflows.argoproj.io/archive-strategy: 'false'
spec:
  arguments:
    parameters:
      - name: param-a
        value: '10.7'
      - name: param-b
        value: '3.2'
      - name: param-c
        value: '-5.5'
  entrypoint: entrypoint
  templates:
    - dag:
        tasks:
          - arguments:
              parameters:
                - name: max-param
                  value: "{{=max(asFloat(workflow.parameters['param-a']), asFloat(workflow.parameters['param-b']))}}"
                - name: min-param
                  value: "{{=min(asFloat(workflow.parameters['param-a']), asFloat(workflow.parameters['param-b']))}}"
                - name: abs-param
                  value: "{{=abs(asFloat(workflow.parameters['param-c']))}}"
                - name: ceil-param
                  value: "{{=ceil(asFloat(workflow.parameters['param-a']))}}"
                - name: floor-param
                  value: "{{=floor(asFloat(workflow.parameters['param-a']))}}"
                - name: round-param
                  value: "{{=round(asFloat(workflow.parameters['param-a']))}}"
            name: number-task
            template: number
      name: entrypoint
    - inputs:
        parameters:
          - name: max-param
          - name: min-param
          - name: abs-param
          - name: ceil-param
          - name: floor-param
          - name: round-param
      name: number
      script:
        command:
          - '/bin/sh'
          - '-e'
        image: busybox
        source: |
          if [ "{{inputs.parameters.max-param}}" != "10.7" ]; then echo "max failed: got '{{inputs.parameters.max-param}}'"; exit 11; fi
          if [ "{{inputs.parameters.min-param}}" != "3.2" ]; then echo "min failed: got '{{inputs.parameters.min-param}}'"; exit 12; fi
          if [ "{{inputs.parameters.abs-param}}" != "5.5" ]; then echo "abs failed: got '{{inputs.parameters.abs-param}}'"; exit 13; fi
          if [ "{{inputs.parameters.ceil-param}}" != "11" ]; then echo "ceil failed: got '{{inputs.parameters.ceil-param}}'"; exit 14; fi
          if [ "{{inputs.parameters.floor-param}}" != "10" ]; then echo "floor failed: got '{{inputs.parameters.floor-param}}'"; exit 15; fi
          if [ "{{inputs.parameters.round-param}}" != "11" ]; then echo "round failed: got '{{inputs.parameters.round-param}}'"; exit 16; fi
          echo "All number function tests passed"
